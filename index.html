<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Runner MVP</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11131a;
        --panel: #1a1f2b;
        --accent: #76d4ff;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at top, #1a2236, var(--bg));
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .app {
        min-height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(6px, 1.2vh, 10px);
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
        max-width: 800px;
        margin: 0 auto;
      }

      .topbar,
      .controls {
        background: color-mix(in srgb, var(--panel) 88%, black);
        border: 1px solid #2a3550;
        border-radius: 10px;
        padding: 8px;
        color: #d8e2f6;
        font-size: 14px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      #hudText {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mode-toggle {
        border: 1px solid #335089;
        border-radius: 8px;
        background: linear-gradient(180deg, #2b4378, #23345a);
        color: #dce8ff;
        font: inherit;
        padding: 6px 10px;
        white-space: nowrap;
      }

      .canvas-wrap {
        background: #0f1320;
        border: 1px solid #2a3550;
        border-radius: 10px;
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: auto;
        aspect-ratio: 9 / 16;
        display: block;
        touch-action: none;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        align-items: stretch;
      }

      .touch-btn {
        border: 1px solid #335089;
        border-radius: 8px;
        background: linear-gradient(180deg, #2b4378, #23345a);
        color: #dce8ff;
        font: inherit;
        font-size: clamp(14px, 2.2vh, 18px);
        min-height: clamp(44px, 8vh, 64px);
        padding: clamp(10px, 1.8vh, 14px);
      }

      .touch-btn:active { transform: translateY(1px); }

      .touch-btn:disabled {
        opacity: 0.45;
        filter: grayscale(0.35);
      }

      .slam-hint {
        grid-column: 1 / -1;
        font-size: 12px;
        color: #9fb4dc;
      }

      #debugOverlay {
        position: fixed;
        top: calc(8px + env(safe-area-inset-top, 0px));
        left: 8px;
        z-index: 20;
        max-width: min(92vw, 420px);
        margin: 0;
        padding: 8px;
        background: rgba(4, 10, 20, 0.88);
        border: 1px solid #355079;
        border-radius: 8px;
        color: #9ce6ff;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        pointer-events: none;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar"><span id="hudText">Runner MVP · Tap right half to jump / left half to slam</span><button id="modeToggle" class="mode-toggle" type="button">Mode: Normal</button></div>
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="640" aria-label="runner game canvas"></canvas>
      </div>
      <div class="controls">
        <button id="slamButton" class="touch-btn" data-action="slam">SLAM</button>
        <button class="touch-btn" data-action="jump">JUMP</button>
        <div id="slamHint" class="slam-hint">Slam only in air</div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
